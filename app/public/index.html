<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-grid"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <main class="container">
        <header class="glass-panel">
            <div class="status-indicator">
                <div class="pulse-dot"></div>
                <span>SYSTEM ONLINE</span>
            </div>
            <h1>DevOps Command Center</h1>
            <p>Automated CI/CD Pipeline & Monitoring Platform</p>
        </header>

        <div class="dashboard-grid">
            <section class="glass-panel metrics-panel">
                <h2>Live Metrics</h2>
                <div class="metrics">
                    <div class="metric-card">
                        <h3>System Uptime</h3>
                        <p class="value" id="uptime">99.9%</p>
                    </div>
                    <div class="metric-card">
                        <h3>Successful Builds</h3>
                        <p class="value">42</p>
                    </div>
                    <div class="metric-card">
                        <h3>Avg Deployment Time</h3>
                        <p class="value">12s</p>
                    </div>
                </div>
            </section>

            <section class="glass-panel terminal-panel">
                <div class="terminal-header">
                    <div class="btn close"></div>
                    <div class="btn minimize"></div>
                    <div class="btn maximize"></div>
                    <span class="title">jenkins@deploy-server:~</span>
                </div>
                <div class="terminal-body" id="terminal">
                    <!-- Typing effect will go here -->
                </div>
            </section>
        </div>

        <footer class="glass-panel links-panel">
            <h3>Quick Links</h3>
            <div class="links">
                <a href="/jenkins/" target="_blank" class="glass-btn">Jenkins CI/CD</a>
                <a href="http://localhost:9090" target="_blank" class="glass-btn">Prometheus</a>
                <a href="https://github.com/amanluthra001/projject" target="_blank" class="glass-btn">Source Code</a>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
